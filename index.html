<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ITGAM WasteAI — Clasificador de Residuos</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#06060e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- ONNX Runtime Web — corre modelos PyTorch directo en el browser -->
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.19.0/dist/ort.min.js"></script>

    <style>
        :root {
            --bg-primary: #06060e;
            --bg-secondary: #0c0c1a;
            --bg-card: #111128;
            --cyan: #00e5ff;
            --cyan-dim: #00e5ff44;
            --text-primary: #e8eaf6;
            --text-secondary: #9fa8da;
            --text-dim: #5c6bc0;
            --color-organico: #2E7D32;
            --color-reciclable: #616161;
            --color-no-aprovechable: #212121;
            --color-peligroso: #C62828;
            --font-display: 'Orbitron', monospace;
            --font-body: 'Exo 2', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: var(--font-body);
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        /* ====== PANTALLA DE CARGA ====== */
        #pantalla-carga {
            position: fixed; inset: 0; z-index: 1000;
            background: var(--bg-primary);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 20px;
            transition: opacity 0.6s, visibility 0.6s;
        }
        #pantalla-carga.oculto { opacity: 0; visibility: hidden; pointer-events: none; }

        #pantalla-carga h1 {
            font-family: var(--font-display);
            font-size: 28px;
            background: linear-gradient(135deg, var(--cyan), #7c4dff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 3px;
        }

        .barra-progreso {
            width: 260px; height: 3px;
            background: var(--bg-card);
            border-radius: 2px; overflow: hidden;
        }
        .barra-progreso-fill {
            height: 100%; width: 0%;
            background: linear-gradient(90deg, var(--cyan), #7c4dff);
            transition: width 0.3s;
        }

        #estado-carga {
            font-size: 13px;
            color: var(--text-secondary);
            letter-spacing: 1px;
        }

        /* ====== LAYOUT ====== */
        #app {
            width: 100%; height: 100%;
            display: grid;
            grid-template-rows: 44px 1fr auto auto;
            background: var(--bg-primary);
        }

        /* Header */
        #header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--cyan-dim);
            z-index: 5;
        }

        #header .logo {
            font-family: var(--font-display);
            font-size: 13px;
            letter-spacing: 2px;
            color: var(--cyan);
        }
        #header .logo span {
            color: var(--text-secondary);
            font-weight: 400;
            font-family: var(--font-body);
            font-size: 10px;
            margin-left: 8px;
            letter-spacing: 0.5px;
        }

        #header .controles { display: flex; gap: 6px; }

        .btn-icono {
            width: 34px; height: 34px;
            border: 1px solid var(--cyan-dim);
            border-radius: 8px;
            background: transparent;
            color: var(--text-secondary);
            font-size: 16px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.15s;
        }
        .btn-icono:active { background: var(--cyan-dim); color: var(--cyan); transform: scale(0.92); }

        /* Zona cámara */
        #zona-camara {
            position: relative;
            overflow: hidden;
            background: #000;
        }

        #video-camara {
            width: 100%; height: 100%;
            object-fit: cover;
            display: block;
        }

        #canvas-captura { display: none; }

        /* Scan overlay */
        #scan-overlay {
            position: absolute; inset: 0;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }
        #scan-overlay.activo { opacity: 1; }

        #scan-overlay .linea-scan {
            position: absolute;
            left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--cyan), transparent);
            box-shadow: 0 0 15px var(--cyan), 0 0 30px var(--cyan);
            animation: scan 1.2s ease-in-out infinite;
        }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

        .esquina {
            position: absolute;
            width: 24px; height: 24px;
            border-color: var(--cyan);
            border-style: solid;
        }
        .esq-tl { top: 12%; left: 12%; border-width: 2px 0 0 2px; }
        .esq-tr { top: 12%; right: 12%; border-width: 2px 2px 0 0; }
        .esq-bl { bottom: 12%; left: 12%; border-width: 0 0 2px 2px; }
        .esq-br { bottom: 12%; right: 12%; border-width: 0 2px 2px 0; }

        /* Resultado */
        #resultado-overlay {
            position: absolute;
            top: 10px; left: 10px; right: 10px;
            background: #06060edd;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--cyan-dim);
            border-radius: 12px;
            padding: 12px 14px;
            opacity: 0;
            transform: translateY(-16px);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 10;
        }
        #resultado-overlay.visible { opacity: 1; transform: translateY(0); }

        .resultado-clase {
            font-family: var(--font-display);
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .resultado-meta {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 4px;
            font-size: 11px;
            color: var(--text-secondary);
        }
        .resultado-meta .confianza { font-weight: 600; }

        .badge {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .badge-alta { background: #1b5e2044; color: #66bb6a; border: 1px solid #66bb6a44; }
        .badge-gemini { background: #4a148c33; color: #ce93d8; border: 1px solid #ce93d844; }

        .resultado-dato {
            margin-top: 6px;
            font-size: 11px;
            color: var(--text-secondary);
            line-height: 1.5;
            font-style: italic;
        }

        /* Botón */
        #zona-boton {
            padding: 8px 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-secondary);
        }

        #btn-clasificar {
            flex: 1;
            max-width: 460px;
            height: 46px;
            border: 1px solid var(--cyan-dim);
            border-radius: 10px;
            font-family: var(--font-display);
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 3px;
            cursor: pointer;
            background: linear-gradient(135deg, #0d47a1, #1a237e);
            color: var(--cyan);
            transition: all 0.15s;
            position: relative;
            overflow: hidden;
        }
        #btn-clasificar:active:not(.analizando) { transform: scale(0.96); }
        #btn-clasificar.analizando {
            background: linear-gradient(135deg, #004d40, #00695c);
            pointer-events: none;
            opacity: 0.8;
        }

        /* Input galería */
        #input-galeria { display: none; }

        /* Contenedores */
        #zona-contenedores {
            padding: 4px 10px 10px;
            background: var(--bg-primary);
            border-top: 1px solid #ffffff08;
        }

        .contenedores-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
            max-width: 800px;
            margin: 0 auto;
        }

        .contenedor-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            padding: 5px 3px;
            border-radius: 10px;
            border: 2px solid transparent;
            position: relative;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .contenedor-item.activo {
            border-color: var(--color-activo);
            background: var(--glow-bg);
            box-shadow: var(--glow-shadow);
        }

        .contenedor-icono {
            width: 32px; height: 36px;
            border-radius: 5px;
            border: 2px solid;
            position: relative;
        }
        .contenedor-icono::before {
            content: '';
            position: absolute;
            top: -4px; left: 3px; right: 3px;
            height: 4px;
            border-radius: 2px 2px 0 0;
            background: inherit;
            border: 2px solid;
            border-color: inherit;
            border-bottom: none;
        }

        .contenedor-label {
            font-size: 8px;
            font-weight: 600;
            letter-spacing: 0.3px;
            text-align: center;
            text-transform: uppercase;
            color: var(--text-dim);
            transition: color 0.3s;
            line-height: 1.2;
        }
        .contenedor-item.activo .contenedor-label { color: var(--text-primary); }

        .contenedor-flecha {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 18px;
            color: var(--cyan);
            opacity: 0;
            transition: opacity 0.3s;
            filter: drop-shadow(0 0 6px var(--cyan));
            animation: flecha-bounce 0.8s ease-in-out infinite;
        }
        .contenedor-item.activo .contenedor-flecha { opacity: 1; }

        @keyframes flecha-bounce {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(4px); }
        }

        /* Colores individuales */
        .cont-organico .contenedor-icono { border-color: var(--color-organico); background: #2E7D3222; }
        .cont-reciclable .contenedor-icono { border-color: var(--color-reciclable); background: #61616122; }
        .cont-no-aprv .contenedor-icono { border-color: var(--color-no-aprovechable); background: #42424222; }
        .cont-peligroso .contenedor-icono { border-color: var(--color-peligroso); background: #C6282822; }

        .cont-organico.activo { --color-activo: var(--color-organico); --glow-bg: #2E7D3218; --glow-shadow: 0 0 20px #2E7D3244, 0 4px 20px #2E7D3233; }
        .cont-reciclable.activo { --color-activo: var(--color-reciclable); --glow-bg: #61616118; --glow-shadow: 0 0 20px #61616144, 0 4px 20px #61616133; }
        .cont-no-aprv.activo { --color-activo: #757575; --glow-bg: #42424218; --glow-shadow: 0 0 20px #42424244, 0 4px 20px #42424233; }
        .cont-peligroso.activo { --color-activo: var(--color-peligroso); --glow-bg: #C6282818; --glow-shadow: 0 0 20px #C6282844, 0 4px 20px #C6282833; }

        /* Preview galería */
        #preview-galeria {
            position: absolute; inset: 0;
            object-fit: contain;
            background: #000;
            z-index: 5;
            display: none;
        }

        @media (orientation: portrait) {
            .contenedor-icono { width: 28px; height: 32px; }
            .contenedor-label { font-size: 7px; }
        }
    </style>
</head>
<body>

<!-- PANTALLA DE CARGA -->
<div id="pantalla-carga">
    <h1>WASTEAI</h1>
    <p style="color: var(--text-dim); font-size: 10px; letter-spacing: 4px; text-transform: uppercase;">
        Instituto Tecnológico de Gustavo A. Madero
    </p>
    <div class="barra-progreso">
        <div class="barra-progreso-fill" id="progreso-fill"></div>
    </div>
    <p id="estado-carga">Inicializando...</p>
</div>

<!-- APP -->
<div id="app">
    <header id="header">
        <div class="logo">WASTEAI <span>ITGAM · TecNM</span></div>
        <div class="controles">
            <button class="btn-icono" id="btn-galeria" title="Subir foto">🖼️</button>
            <button class="btn-icono" id="btn-cambiar-camara" title="Cambiar cámara">🔄</button>
        </div>
    </header>

    <section id="zona-camara">
        <video id="video-camara" autoplay playsinline muted webkit-playsinline></video>
        <canvas id="canvas-captura"></canvas>
        <img id="preview-galeria" alt="Preview">

        <div id="scan-overlay">
            <div class="linea-scan"></div>
            <div class="esquina esq-tl"></div>
            <div class="esquina esq-tr"></div>
            <div class="esquina esq-bl"></div>
            <div class="esquina esq-br"></div>
        </div>

        <div id="resultado-overlay">
            <div class="resultado-clase" id="res-clase"></div>
            <div class="resultado-meta">
                <span class="confianza" id="res-confianza"></span>
                <span class="badge" id="res-badge"></span>
            </div>
            <div class="resultado-dato" id="res-dato"></div>
        </div>
    </section>

    <section id="zona-boton">
        <button id="btn-clasificar">CLASIFICAR</button>
        <input type="file" id="input-galeria" accept="image/*">
    </section>

    <section id="zona-contenedores">
        <div class="contenedores-grid">
            <div class="contenedor-item cont-organico" data-clase="organico">
                <div class="contenedor-flecha">▼</div>
                <div class="contenedor-icono"></div>
                <div class="contenedor-label">Orgánico</div>
            </div>
            <div class="contenedor-item cont-reciclable" data-clase="inorganico_reciclable">
                <div class="contenedor-flecha">▼</div>
                <div class="contenedor-icono"></div>
                <div class="contenedor-label">Inorgánico Reciclable</div>
            </div>
            <div class="contenedor-item cont-no-aprv" data-clase="no_aprovechable">
                <div class="contenedor-flecha">▼</div>
                <div class="contenedor-icono"></div>
                <div class="contenedor-label">No Aprovechable</div>
            </div>
            <div class="contenedor-item cont-peligroso" data-clase="peligroso">
                <div class="contenedor-flecha">▼</div>
                <div class="contenedor-icono"></div>
                <div class="contenedor-label">Peligroso</div>
            </div>
        </div>
    </section>
</div>

<script>
// ============================================================
// CONFIGURACIÓN
// ============================================================
const CLASES_MODELO = ['inorganico_reciclable', 'no_aprovechable', 'organico', 'peligroso'];
const NOMBRES_CLASE = {
    organico: 'ORGÁNICO',
    inorganico_reciclable: 'INORGÁNICO RECICLABLE',
    no_aprovechable: 'NO APROVECHABLE',
    peligroso: 'RESIDUO PELIGROSO'
};
const COLORES_CLASE = {
    organico: '#2E7D32',
    inorganico_reciclable: '#616161',
    no_aprovechable: '#424242',
    peligroso: '#C62828'
};

// Normalización ImageNet (la que usó PyTorch al entrenar)
const MEAN = [0.485, 0.456, 0.406];
const STD  = [0.229, 0.224, 0.225];
const IMG_SIZE = 224;
const MODEL_PATH = 'model/wasteai_final.onnx';

// ============================================================
// ESTADO
// ============================================================
let sesionONNX = null;
let streamCamara = null;
let usandoCamaraFrontal = false;
let analizando = false;

// ============================================================
// ELEMENTOS DOM
// ============================================================
const $ = id => document.getElementById(id);
const $video       = $('video-camara');
const $canvas      = $('canvas-captura');
const $ctx         = $canvas.getContext('2d', { willReadFrequently: true });
const $btnClasif   = $('btn-clasificar');
const $btnCamara   = $('btn-cambiar-camara');
const $btnGaleria  = $('btn-galeria');
const $inputGal    = $('input-galeria');
const $scanOverlay = $('scan-overlay');
const $resOverlay  = $('resultado-overlay');
const $resClase    = $('res-clase');
const $resConf     = $('res-confianza');
const $resBadge    = $('res-badge');
const $resDato     = $('res-dato');
const $previewGal  = $('preview-galeria');
const $progresoFill = $('progreso-fill');
const $estadoCarga = $('estado-carga');
const $pantallaCarga = $('pantalla-carga');

// ============================================================
// INICIALIZACIÓN
// ============================================================
async function inicializar() {
    try {
        // Configurar ONNX Runtime — usar WASM (funciona en todos los dispositivos)
        ort.env.wasm.wasmPaths = 'https://cdn.jsdelivr.net/npm/onnxruntime-web@1.19.0/dist/';

        actualizarCarga('Descargando modelo de IA...', 5);

        // Descargar modelo con indicador de progreso
        const response = await fetch(MODEL_PATH);
        if (!response.ok) throw new Error('No se encontró el modelo ONNX');

        const contentLength = parseInt(response.headers.get('Content-Length') || '0');
        const reader = response.body.getReader();
        const chunks = [];
        let bytesRecibidos = 0;

        while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            chunks.push(value);
            bytesRecibidos += value.length;
            if (contentLength > 0) {
                const pct = Math.min(70, (bytesRecibidos / contentLength) * 70);
                actualizarCarga(`Descargando modelo... ${(bytesRecibidos / 1024 / 1024).toFixed(1)} MB`, pct);
            }
        }

        // Ensamblar buffer
        const modelBuffer = new Uint8Array(bytesRecibidos);
        let offset = 0;
        for (const chunk of chunks) {
            modelBuffer.set(chunk, offset);
            offset += chunk.length;
        }

        actualizarCarga('Cargando modelo en memoria...', 75);

        // Crear sesión ONNX
        sesionONNX = await ort.InferenceSession.create(modelBuffer.buffer, {
            executionProviders: ['wasm'],
            graphOptimizationLevel: 'all'
        });

        actualizarCarga('Calentando motor...', 85);

        // Warmup — primera inferencia siempre es lenta
        const dummy = new ort.Tensor('float32', new Float32Array(1 * 3 * IMG_SIZE * IMG_SIZE), [1, 3, IMG_SIZE, IMG_SIZE]);
        const warmupResult = await sesionONNX.run({ input: dummy });
        // Verificar que la salida tiene 4 clases
        const outputName = Object.keys(warmupResult)[0];
        const outputData = warmupResult[outputName].data;
        if (outputData.length !== 4) throw new Error(`Salida inesperada: ${outputData.length} clases`);

        actualizarCarga('Activando cámara...', 92);
        await iniciarCamara();

        actualizarCarga('¡Listo!', 100);
        setTimeout(() => $pantallaCarga.classList.add('oculto'), 400);

    } catch (err) {
        console.error('Error al inicializar:', err);
        $estadoCarga.textContent = `Error: ${err.message}`;
        $estadoCarga.style.color = '#ef5350';
    }
}

function actualizarCarga(texto, pct) {
    $estadoCarga.textContent = texto;
    $progresoFill.style.width = pct + '%';
}

// ============================================================
// CÁMARA
// ============================================================
async function iniciarCamara() {
    if (streamCamara) streamCamara.getTracks().forEach(t => t.stop());

    try {
        streamCamara = await navigator.mediaDevices.getUserMedia({
            video: {
                facingMode: usandoCamaraFrontal ? 'user' : 'environment',
                width: { ideal: 1280 },
                height: { ideal: 720 }
            },
            audio: false
        });
        $video.srcObject = streamCamara;
        $previewGal.style.display = 'none';
    } catch (err) {
        console.error('Error cámara:', err);
    }
    $video.srcObject = streamCamara;
    $video.play().catch(() => {});  // ← agrega esta línea
    $previewGal.style.display = 'none';
}

// ============================================================
// PREPROCESAMIENTO — crítico para precisión
// ============================================================
function capturarYPreprocesar() {
    $canvas.width = IMG_SIZE;
    $canvas.height = IMG_SIZE;

    // Dibujar frame en canvas 224x224
    if ($previewGal.style.display === 'block') {
        $ctx.drawImage($previewGal, 0, 0, IMG_SIZE, IMG_SIZE);
    } else {
        const vw = $video.videoWidth;
        const vh = $video.videoHeight;
        const min = Math.min(vw, vh);
        const sx = (vw - min) / 2;
        const sy = (vh - min) / 2;
        $ctx.drawImage($video, sx, sy, min, min, 0, 0, IMG_SIZE, IMG_SIZE);
    }

    // Obtener pixels RGBA
    const imageData = $ctx.getImageData(0, 0, IMG_SIZE, IMG_SIZE);
    const rgba = imageData.data;

    // Convertir a CHW float32 con normalización ImageNet
    // PyTorch usa formato NCHW: [batch, canales, alto, ancho]
    const chw = new Float32Array(1 * 3 * IMG_SIZE * IMG_SIZE);

    for (let y = 0; y < IMG_SIZE; y++) {
        for (let x = 0; x < IMG_SIZE; x++) {
            const srcIdx = (y * IMG_SIZE + x) * 4;
            for (let c = 0; c < 3; c++) {
                const pixel = rgba[srcIdx + c] / 255.0;
                const normalized = (pixel - MEAN[c]) / STD[c];
                chw[c * IMG_SIZE * IMG_SIZE + y * IMG_SIZE + x] = normalized;
            }
        }
    }

    return new ort.Tensor('float32', chw, [1, 3, IMG_SIZE, IMG_SIZE]);
}

function capturarBase64ParaGemini() {
    const c = document.createElement('canvas');
    c.width = 512; c.height = 512;
    const ctx = c.getContext('2d');

    if ($previewGal.style.display === 'block') {
        ctx.drawImage($previewGal, 0, 0, 512, 512);
    } else {
        const vw = $video.videoWidth;
        const vh = $video.videoHeight;
        const min = Math.min(vw, vh);
        ctx.drawImage($video, (vw - min) / 2, (vh - min) / 2, min, min, 0, 0, 512, 512);
    }

    return c.toDataURL('image/jpeg', 0.85).split(',')[1];
}

// ============================================================
// INFERENCIA LOCAL — ONNX Runtime (modelo completo fine-tuneado)
// ============================================================
async function clasificarLocal() {
    const tensor = capturarYPreprocesar();

    // Ejecutar inferencia
    const resultados = await sesionONNX.run({ input: tensor });
    const outputName = Object.keys(resultados)[0];
    const logits = Array.from(resultados[outputName].data);

    // Softmax
    const maxLogit = Math.max(...logits);
    const exps = logits.map(l => Math.exp(l - maxLogit));
    const sumExps = exps.reduce((a, b) => a + b, 0);
    const probs = exps.map(e => e / sumExps);

    // Clase con mayor probabilidad
    let maxIdx = 0;
    for (let i = 1; i < probs.length; i++) {
        if (probs[i] > probs[maxIdx]) maxIdx = i;
    }

    return {
        clase: CLASES_MODELO[maxIdx],
        confianza: probs[maxIdx],
        todas: Object.fromEntries(CLASES_MODELO.map((c, i) => [c, probs[i]]))
    };
}

// ============================================================
// GEMINI — vía serverless /api/gemini
// ============================================================
async function clasificarGemini(base64Img) {
    if (!base64Img || base64Img.length < 1000) return null;
    try {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 30000);

        const res = await fetch('/api/gemini', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ tipo: 'vision', base64Img }),
            signal: controller.signal
        });
        clearTimeout(timeout);

        if (!res.ok) return null;
        const data = await res.json();
        const clase = data.texto?.trim() || null;
        return CLASES_MODELO.includes(clase) ? clase : null;
    } catch (err) {
        console.warn('Gemini no disponible:', err.message);
        return null;
    }
}

async function obtenerDatoCurioso(clase) {
    try {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 15000);

        const res = await fetch('/api/gemini', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ tipo: 'dato', clase }),
            signal: controller.signal
        });
        clearTimeout(timeout);

        const data = await res.json();
        return data.texto || '';
    } catch {
        return '';
    }
}

// ============================================================
// FLUJO PRINCIPAL
// ============================================================
async function clasificar() {
    if (analizando || !sesionONNX) return;
    analizando = true;

    // UI inmediata — el usuario ve feedback al instante
    $btnClasif.classList.add('analizando');
    $btnClasif.textContent = 'ANALIZANDO...';
    $scanOverlay.classList.add('activo');
    $resOverlay.classList.remove('visible');
    limpiarContenedores();

    // Esperar un frame para que el browser pinte los cambios de UI
    await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));

    try {
        // Capturar base64 para Gemini ANTES de la inferencia local
        const base64 = capturarBase64ParaGemini();

        // Ejecutar ambos motores en paralelo
        const [resultadoLocal, claseGemini] = await Promise.all([
            clasificarLocal(),
            clasificarGemini(base64)
        ]);

        // Determinar resultado final
        let claseFinal = resultadoLocal.clase;
        let confianzaFinal = resultadoLocal.confianza;
        let concordancia = false;

        if (claseGemini) {
            concordancia = (resultadoLocal.clase === claseGemini);
            if (!concordancia) {
                claseFinal = claseGemini;
                confianzaFinal = resultadoLocal.todas[claseGemini] || 0;
            }
        }

        // Mostrar resultado
        $scanOverlay.classList.remove('activo');
        mostrarResultado(claseFinal, confianzaFinal, concordancia, claseGemini, resultadoLocal.clase);

        // Dato curioso — no bloquea
        obtenerDatoCurioso(claseFinal).then(dato => {
            if (dato) $resDato.textContent = dato;
        });

    } catch (err) {
        console.error('Error clasificando:', err);
        $scanOverlay.classList.remove('activo');
    }

    // Restaurar botón
    $btnClasif.classList.remove('analizando');
    $btnClasif.textContent = 'CLASIFICAR';
    analizando = false;
}

// ============================================================
// MOSTRAR RESULTADO
// ============================================================
function mostrarResultado(clase, confianza, concordancia, claseGemini, claseLocal) {
    const nombre = NOMBRES_CLASE[clase] || clase.toUpperCase();
    const color = COLORES_CLASE[clase] || '#fff';
    const pct = (confianza * 100).toFixed(1);

    $resClase.textContent = nombre;
    $resClase.style.color = color;
    $resConf.textContent = pct + '%';

    if (claseGemini && concordancia) {
        $resBadge.textContent = '✓ ALTA CONFIANZA';
        $resBadge.className = 'badge badge-alta';
    } else if (claseGemini && !concordancia) {
        $resBadge.textContent = 'GEMINI CORRIGE → ' + (NOMBRES_CLASE[claseGemini] || '');
        $resBadge.className = 'badge badge-gemini';
    } else {
        $resBadge.textContent = 'MODELO LOCAL';
        $resBadge.className = 'badge badge-gemini';
    }

    $resDato.textContent = '';
    $resOverlay.classList.add('visible');
    activarContenedor(clase);
}

function activarContenedor(clase) {
    limpiarContenedores();
    const item = document.querySelector(`.contenedor-item[data-clase="${clase}"]`);
    if (item) item.classList.add('activo');
}

function limpiarContenedores() {
    document.querySelectorAll('.contenedor-item').forEach(el => el.classList.remove('activo'));
}

// ============================================================
// EVENTOS
// ============================================================
$btnClasif.addEventListener('click', clasificar);

$btnCamara.addEventListener('click', () => {
    usandoCamaraFrontal = !usandoCamaraFrontal;
    iniciarCamara();
});

$btnGaleria.addEventListener('click', () => $inputGal.click());

$inputGal.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
        $previewGal.src = ev.target.result;
        $previewGal.style.display = 'block';
        $previewGal.onload = () => clasificar();
    };
    reader.readAsDataURL(file);
    e.target.value = '';
});

$video.addEventListener('click', () => {
    if ($previewGal.style.display === 'block') {
        $previewGal.style.display = 'none';
        $resOverlay.classList.remove('visible');
        limpiarContenedores();
    }
});

// ============================================================
// ARRANQUE
// ============================================================
inicializar();

if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
    });
}
</script>
