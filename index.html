<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ITGAM WasteAI — Clasificador de Residuos</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#06060e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.19.0/dist/ort.min.js"></script>

    <style>
        :root {
            --bg-primary: #06060e;
            --bg-secondary: #0c0c1a;
            --bg-card: #111128;
            --cyan: #00e5ff;
            --cyan-dim: #00e5ff44;
            --text-primary: #e8eaf6;
            --text-secondary: #9fa8da;
            --text-dim: #5c6bc0;
            --color-organico: #2E7D32;
            --color-reciclable: #616161;
            --color-no-aprovechable: #212121;
            --color-peligroso: #C62828;
            --font-display: 'Orbitron', monospace;
            --font-body: 'Exo 2', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: var(--font-body);
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        /* ====== PANTALLA DE CARGA ====== */
        #pantalla-carga {
            position: fixed; inset: 0; z-index: 1000;
            background: var(--bg-primary);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 20px;
            transition: opacity 0.6s, visibility 0.6s;
        }
        #pantalla-carga.oculto { opacity: 0; visibility: hidden; pointer-events: none; }

        #pantalla-carga h1 {
            font-family: var(--font-display);
            font-size: 28px;
            background: linear-gradient(135deg, var(--cyan), #7c4dff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 3px;
        }

        .barra-progreso {
            width: 260px; height: 3px;
            background: var(--bg-card);
            border-radius: 2px; overflow: hidden;
        }
        .barra-progreso-fill {
            height: 100%; width: 0%;
            background: linear-gradient(90deg, var(--cyan), #7c4dff);
            transition: width 0.3s;
        }

        #estado-carga {
            font-size: 13px;
            color: var(--text-secondary);
            letter-spacing: 1px;
        }

        /* ====== LAYOUT ====== */
        #app {
            width: 100%; height: 100%;
            display: grid;
            grid-template-rows: 44px 1fr auto auto;
            background: var(--bg-primary);
        }

        #header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--cyan-dim);
            z-index: 5;
        }

        #header .logo {
            font-family: var(--font-display);
            font-size: 13px;
            letter-spacing: 2px;
            color: var(--cyan);
        }
        #header .logo span {
            color: var(--text-secondary);
            font-weight: 400;
            font-family: var(--font-body);
            font-size: 10px;
            margin-left: 8px;
            letter-spacing: 0.5px;
        }

        #header .controles { display: flex; gap: 6px; }

        .btn-icono {
            width: 34px; height: 34px;
            border: 1px solid var(--cyan-dim);
            border-radius: 8px;
            background: transparent;
            color: var(--text-secondary);
            font-size: 16px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.15s;
        }
        .btn-icono:active { background: var(--cyan-dim); color: var(--cyan); transform: scale(0.92); }

        /* Zona cámara */
        #zona-camara {
            position: relative;
            overflow: hidden;
            background: #000;
        }

        #video-camara {
            width: 100%; height: 100%;
            object-fit: cover;
            display: block;
        }

        #canvas-captura { display: none; }

        /* Scan overlay */
        #scan-overlay {
            position: absolute; inset: 0;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }
        #scan-overlay.activo { opacity: 1; }

        #scan-overlay .linea-scan {
            position: absolute;
            left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--cyan), transparent);
            box-shadow: 0 0 15px var(--cyan), 0 0 30px var(--cyan);
            animation: scan 1.2s ease-in-out infinite;
        }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

        .esquina {
            position: absolute;
            width: 24px; height: 24px;
            border-color: var(--cyan);
            border-style: solid;
        }
        .esq-tl { top: 12%; left: 12%; border-width: 2px 0 0 2px; }
        .esq-tr { top: 12%; right: 12%; border-width: 2px 2px 0 0; }
        .esq-bl { bottom: 12%; left: 12%; border-width: 0 0 2px 2px; }
        .esq-br { bottom: 12%; right: 12%; border-width: 0 2px 2px 0; }

        /* Resultado */
        #resultado-overlay {
            position: absolute;
            top: 10px; left: 10px; right: 10px;
            background: #06060edd;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--cyan-dim);
            border-radius: 12px;
            padding: 12px 14px;
            opacity: 0;
            transform: translateY(-16px);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 10;
        }
        #resultado-overlay.visible { opacity: 1; transform: translateY(0); }

        .resultado-clase {
            font-family: var(--font-display);
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .resultado-meta {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 4px;
            font-size: 11px;
            color: var(--text-secondary);
        }
        .resultado-meta .confianza { font-weight: 600; }

        .badge {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .badge-alta    { background: #1b5e2044; color: #66bb6a; border: 1px solid #66bb6a44; }
        .badge-gemini  { background: #4a148c33; color: #ce93d8; border: 1px solid #ce93d844; }
        .badge-ensemble{ background: #01579b33; color: #4fc3f7; border: 1px solid #4fc3f744; }
        .badge-local   { background: #37474f44; color: #90a4ae; border: 1px solid #90a4ae44; }

        .resultado-dato {
            margin-top: 6px;
            font-size: 11px;
            color: var(--text-secondary);
            line-height: 1.5;
            font-style: italic;
        }

        /* Botón */
        #zona-boton {
            padding: 8px 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-secondary);
        }

        #btn-clasificar {
            flex: 1;
            max-width: 460px;
            height: 46px;
            border: 1px solid var(--cyan-dim);
            border-radius: 10px;
            font-family: var(--font-display);
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 3px;
            cursor: pointer;
            background: linear-gradient(135deg, #0d47a1, #1a237e);
            color: var(--cyan);
            transition: all 0.15s;
            position: relative;
            overflow: hidden;
            /* Zona táctil generosa para no necesitar múltiples taps */
            touch-action: manipulation;
        }
        #btn-clasificar:active:not([disabled]) {
            transform: scale(0.96);
            background: linear-gradient(135deg, #1565c0, #283593);
        }
        #btn-clasificar[disabled] {
            background: linear-gradient(135deg, #004d40, #00695c);
            pointer-events: none;
            opacity: 0.85;
            cursor: not-allowed;
        }

        #input-galeria { display: none; }

        /* Contenedores */
        #zona-contenedores {
            padding: 4px 10px 10px;
            background: var(--bg-primary);
            border-top: 1px solid #ffffff08;
        }

        .contenedores-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
            max-width: 800px;
            margin: 0 auto;
        }

        .contenedor-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            padding: 5px 3px;
            border-radius: 10px;
            border: 2px solid transparent;
            position: relative;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .contenedor-item.activo {
            border-color: var(--color-activo);
            background: var(--glow-bg);
            box-shadow: var(--glow-shadow);
        }

        .contenedor-icono {
            width: 32px; height: 36px;
            border-radius: 5px;
            border: 2px solid;
            position: relative;
        }
        .contenedor-icono::before {
            content: '';
            position: absolute;
            top: -4px; left: 3px; right: 3px;
            height: 4px;
            border-radius: 2px 2px 0 0;
            background: inherit;
            border: 2px solid;
            border-color: inherit;
            border-bottom: none;
        }

        .contenedor-label {
            font-size: 8px;
            font-weight: 600;
            letter-spacing: 0.3px;
            text-align: center;
            text-transform: uppercase;
            color: var(--text-dim);
            transition: color 0.3s;
            line-height: 1.2;
        }
        .contenedor-item.activo .contenedor-label { color: var(--text-primary); }

        .contenedor-flecha {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 18px;
            color: var(--cyan);
            opacity: 0;
            transition: opacity 0.3s;
            filter: drop-shadow(0 0 6px var(--cyan));
            animation: flecha-bounce 0.8s ease-in-out infinite;
        }
        .contenedor-item.activo .contenedor-flecha { opacity: 1; }

        @keyframes flecha-bounce {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(4px); }
        }

        .cont-organico   .contenedor-icono { border-color: var(--color-organico);        background: #2E7D3222; }
        .cont-reciclable .contenedor-icono { border-color: var(--color-reciclable);       background: #61616122; }
        .cont-no-aprv    .contenedor-icono { border-color: var(--color-no-aprovechable);  background: #42424222; }
        .cont-peligroso  .contenedor-icono { border-color: var(--color-peligroso);        background: #C6282822; }

        .cont-organico.activo   { --color-activo: var(--color-organico);        --glow-bg: #2E7D3218; --glow-shadow: 0 0 20px #2E7D3244, 0 4px 20px #2E7D3233; }
        .cont-reciclable.activo { --color-activo: var(--color-reciclable);      --glow-bg: #61616118; --glow-shadow: 0 0 20px #61616144, 0 4px 20px #61616133; }
        .cont-no-aprv.activo    { --color-activo: #757575;                      --glow-bg: #42424218; --glow-shadow: 0 0 20px #42424244, 0 4px 20px #42424233; }
        .cont-peligroso.activo  { --color-activo: var(--color-peligroso);       --glow-bg: #C6282818; --glow-shadow: 0 0 20px #C6282844, 0 4px 20px #C6282833; }

        #preview-galeria {
            position: absolute; inset: 0;
            object-fit: contain;
            background: #000;
            z-index: 5;
            display: none;
        }

        @media (orientation: portrait) {
            .contenedor-icono { width: 28px; height: 32px; }
            .contenedor-label { font-size: 7px; }
        }
    </style>
</head>
<body>

<div id="pantalla-carga">

</div>

<div id="app">
    <header id="header">
        <div class="logo">WASTEAI <span>ITGAM · TecNM</span></div>
        <div class="controles">
            <button class="btn-icono" id="btn-galeria" title="Subir foto">🖼️</button>

        </div>

        <div id="scan-overlay">

    <section id="zona-contenedores">

                <div class="contenedor-flecha">▼</div>

                <div class="contenedor-flecha">▼</div>

                <div class="contenedor-label">Inorgánico Reciclable</div>
            </div>
            <div class="contenedor-item cont-no-aprv" data-clase="no_aprovechable">
                <div class="contenedor-flecha">▼</div>

            </div>
        </div>

</div>

<script>
// ============================================================
// CONFIGURACIÓN
// ============================================================

// Orden de clases — DEBE coincidir con el orden de ImageFolder (alfabético)
// Verificado en los tres entrenamientos:
// V1: ['inorganico_reciclable', 'no_aprovechable', 'organico', 'peligroso']
// V2: ['inorganico_reciclable', 'no_aprovechable', 'organico', 'peligroso']
// V3: ['inorganico_reciclable', 'no_aprovechable', 'organico', 'peligroso'] ← Keras alphabetical
const CLASES    = ['inorganico_reciclable', 'no_aprovechable', 'organico', 'peligroso'];
// V3 usa image_dataset_from_directory con class_names explícito:
// ['organico', 'inorganico_reciclable', 'no_aprovechable', 'peligroso']
const CLASES_V3 = ['organico', 'inorganico_reciclable', 'no_aprovechable', 'peligroso'];

const NOMBRES = {
    organico:              'ORGÁNICO',
    inorganico_reciclable: 'INORGÁNICO RECICLABLE',
    no_aprovechable:       'NO APROVECHABLE',
    peligroso:             'RESIDUO PELIGROSO'
};

const COLORES = {
    organico:              '#2E7D32',
    inorganico_reciclable: '#616161',
    no_aprovechable:       '#424242',
    peligroso:             '#C62828'
};

// Normalización ImageNet — igual a como PyTorch entrenó ambos modelos
const MEAN    = [0.485, 0.456, 0.406];
const STD     = [0.229, 0.224, 0.225];
const IMG_SIZE = 224;

// Rutas de los tres modelos
const PATH_V1 = 'model/wasteai_final.onnx';  // EfficientNetB0 — datasets originales (PyTorch/NCHW)
const PATH_V2 = 'model/wasteai_v2.onnx';     // EfficientNetB0 — datasets especializados (PyTorch/NCHW)
const PATH_V3 = 'model/wasteai_v3.onnx';     // EfficientNetB0 — 67k imgs, 95% acc (Keras/NHWC)

// ============================================================
// ESTADO GLOBAL
// ============================================================
let sesionV1 = null;
let sesionV2 = null;
let sesionV3 = null;
let streamCamara = null;
let usandoCamaraFrontal = false;
let analizando = false;

// ============================================================
// DOM
// ============================================================
const $  = id => document.getElementById(id);
const $video        = $('video-camara');
const $canvas       = $('canvas-captura');
const $ctx          = $canvas.getContext('2d', { willReadFrequently: true });
const $btnClasif    = $('btn-clasificar');
const $btnCamara    = $('btn-cambiar-camara');
const $btnGaleria   = $('btn-galeria');
const $inputGal     = $('input-galeria');
const $scanOverlay  = $('scan-overlay');
const $resOverlay   = $('resultado-overlay');
const $resClase     = $('res-clase');
const $resConf      = $('res-confianza');
const $resBadge     = $('res-badge');
const $resDato      = $('res-dato');
const $previewGal   = $('preview-galeria');
const $fill         = $('progreso-fill');
const $estado       = $('estado-carga');
const $carga        = $('pantalla-carga');

// ============================================================
// UTILIDADES
// ============================================================
function actualizarCarga(texto, pct) {
    $estado.textContent = texto;
    $fill.style.width   = pct + '%';
}

// Descarga un modelo ONNX con barra de progreso y devuelve ArrayBuffer
async function descargarModelo(path, pctInicio, pctFin, nombre) {
    actualizarCarga(`Descargando ${nombre}...`, pctInicio);
    const res = await fetch(path);
    if (!res.ok) throw new Error(`No se encontró ${path}`);

    const contentLength = parseInt(res.headers.get('Content-Length') || '0');
    const reader = res.body.getReader();
    const chunks = [];
    let recibidos = 0;

    while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        chunks.push(value);
        recibidos += value.length;
        if (contentLength > 0) {
            const pct = pctInicio + ((recibidos / contentLength) * (pctFin - pctInicio));
            actualizarCarga(
                `Descargando ${nombre}... ${(recibidos / 1048576).toFixed(1)} MB`,
                Math.min(pctFin, pct)
            );
        }
    }

    const buf = new Uint8Array(recibidos);
    let offset = 0;
    for (const chunk of chunks) { buf.set(chunk, offset); offset += chunk.length; }
    return buf.buffer;
}

// Softmax numérico estable
function softmax(logits) {
    const max = Math.max(...logits);
    const exps = logits.map(l => Math.exp(l - max));
    const sum  = exps.reduce((a, b) => a + b, 0);
    return exps.map(e => e / sum);
}

// ============================================================
// INICIALIZACIÓN — carga ambos modelos en paralelo
// ============================================================
async function inicializar() {
    try {
        // Configurar WASM paths para ONNX Runtime
        ort.env.wasm.wasmPaths = 'https://cdn.jsdelivr.net/npm/onnxruntime-web@1.19.0/dist/';

        actualizarCarga('Preparando motores de IA...', 2);

        // Descargar los tres modelos en paralelo
        const [bufV1, bufV2, bufV3] = await Promise.all([
            descargarModelo(PATH_V1, 2,  35, 'Modelo V1'),
            descargarModelo(PATH_V2, 35, 68, 'Modelo V2'),
            descargarModelo(PATH_V3, 68, 88, 'Modelo V3')
        ]);

        actualizarCarga('Cargando modelos en memoria...', 88);

        // Crear sesiones ONNX
        const opciones = {
            executionProviders: ['wasm'],
            graphOptimizationLevel: 'all'
        };
        [sesionV1, sesionV2, sesionV3] = await Promise.all([
            ort.InferenceSession.create(bufV1, opciones),
            ort.InferenceSession.create(bufV2, opciones),
            ort.InferenceSession.create(bufV3, opciones)
        ]);

        actualizarCarga('Calentando motores...', 93);

        // Warmup — V1/V2 usan NCHW, V3 usa NHWC
        const dummyNCHW = new ort.Tensor('float32',
            new Float32Array(3 * IMG_SIZE * IMG_SIZE), [1, 3, IMG_SIZE, IMG_SIZE]);
        const dummyNHWC = new ort.Tensor('float32',
            new Float32Array(IMG_SIZE * IMG_SIZE * 3), [1, IMG_SIZE, IMG_SIZE, 3]);
        await Promise.all([
            sesionV1.run({ input: dummyNCHW }),
            sesionV2.run({ input: dummyNCHW }),
            sesionV3.run({ input: dummyNHWC })
        ]);

        actualizarCarga('Activando cámara...', 96);
        await iniciarCamara();

        actualizarCarga('¡Sistema listo!', 100);
        setTimeout(() => $carga.classList.add('oculto'), 400);

    } catch (err) {
        console.error('Error al inicializar:', err);
        $estado.textContent = '❌ ' + err.message;
        $estado.style.color = '#ef5350';
    }
}

// ============================================================
// CÁMARA
// ============================================================
async function iniciarCamara() {
    if (streamCamara) streamCamara.getTracks().forEach(t => t.stop());
    try {
        streamCamara = await navigator.mediaDevices.getUserMedia({
            video: {
                facingMode: usandoCamaraFrontal ? 'user' : 'environment',
                width: { ideal: 1280 },
                height: { ideal: 720 }
            },
            audio: false
        });
        $video.srcObject = streamCamara;
        await $video.play().catch(() => {});
        $previewGal.style.display = 'none';
    } catch (err) {
        console.warn('Error cámara:', err);
    }
}

// ============================================================
// PREPROCESAMIENTO V1/V2 — NCHW float32 con normalización ImageNet
// ============================================================
function preprocesar() {
    $canvas.width  = IMG_SIZE;
    $canvas.height = IMG_SIZE;

    // Recorte cuadrado centrado (igual a CenterCrop de PyTorch)
    if ($previewGal.style.display === 'block') {
        $ctx.drawImage($previewGal, 0, 0, IMG_SIZE, IMG_SIZE);
    } else {
        const vw = $video.videoWidth  || IMG_SIZE;
        const vh = $video.videoHeight || IMG_SIZE;
        const min = Math.min(vw, vh);
        const sx  = (vw - min) / 2;
        const sy  = (vh - min) / 2;
        $ctx.drawImage($video, sx, sy, min, min, 0, 0, IMG_SIZE, IMG_SIZE);
    }

    const rgba = $ctx.getImageData(0, 0, IMG_SIZE, IMG_SIZE).data;
    const chw  = new Float32Array(3 * IMG_SIZE * IMG_SIZE);

    // NCHW: [canal][fila][col] con normalización ImageNet
    for (let y = 0; y < IMG_SIZE; y++) {
        for (let x = 0; x < IMG_SIZE; x++) {
            const src = (y * IMG_SIZE + x) * 4;
            for (let c = 0; c < 3; c++) {
                chw[c * IMG_SIZE * IMG_SIZE + y * IMG_SIZE + x] =
                    (rgba[src + c] / 255.0 - MEAN[c]) / STD[c];
            }
        }
    }

    return new ort.Tensor('float32', chw, [1, 3, IMG_SIZE, IMG_SIZE]);
}

// ============================================================
// PREPROCESAMIENTO V3 — NHWC float32, píxeles 0-255
// EfficientNetB0 de Keras incluye su propio rescaling interno
// ============================================================
function preprocesarV3() {
    // Reusar el canvas ya dibujado por preprocesar()
    const rgba = $ctx.getImageData(0, 0, IMG_SIZE, IMG_SIZE).data;
    const nhwc = new Float32Array(IMG_SIZE * IMG_SIZE * 3);

    // NHWC: [fila][col][canal], valores 0-255
    for (let y = 0; y < IMG_SIZE; y++) {
        for (let x = 0; x < IMG_SIZE; x++) {
            const src = (y * IMG_SIZE + x) * 4;
            const dst = (y * IMG_SIZE + x) * 3;
            nhwc[dst]     = rgba[src];       // R
            nhwc[dst + 1] = rgba[src + 1];   // G
            nhwc[dst + 2] = rgba[src + 2];   // B
        }
    }

    return new ort.Tensor('float32', nhwc, [1, IMG_SIZE, IMG_SIZE, 3]);
}

// Captura JPEG para Gemini (512×512 es suficiente y más rápido)
function capturarBase64() {
    const c   = document.createElement('canvas');
    c.width   = 512;
    c.height  = 512;
    const ctx = c.getContext('2d');
    if ($previewGal.style.display === 'block') {
        ctx.drawImage($previewGal, 0, 0, 512, 512);
    } else {
        const vw  = $video.videoWidth  || 512;
        const vh  = $video.videoHeight || 512;
        const min = Math.min(vw, vh);
        ctx.drawImage($video, (vw - min) / 2, (vh - min) / 2, min, min, 0, 0, 512, 512);
    }
    return c.toDataURL('image/jpeg', 0.85).split(',')[1];
}

// ============================================================
// INFERENCIA ENSEMBLE — votación ponderada por confianza individual
// ============================================================
async function clasificarEnsemble() {
    const tensorNCHW = preprocesar();        // V1 y V2: NCHW + ImageNet norm
    const tensorNHWC = preprocesarV3();      // V3: NHWC + píxeles 0-255

    // Ejecutar los tres modelos en paralelo
    const [outV1, outV2, outV3] = await Promise.all([
        sesionV1.run({ input: tensorNCHW }),
        sesionV2.run({ input: tensorNCHW }),
        sesionV3.run({ input: tensorNHWC })
    ]);

    const logitsV1 = Array.from(Object.values(outV1)[0].data);
    const logitsV2 = Array.from(Object.values(outV2)[0].data);
    const logitsV3raw = Array.from(Object.values(outV3)[0].data);

    const probsV1 = softmax(logitsV1);
    const probsV2 = softmax(logitsV2);

    // V3 usa CLASES_V3 (orden diferente) → remapear a orden CLASES
    const probsV3raw = softmax(logitsV3raw);
    const probsV3 = CLASES.map(c => probsV3raw[CLASES_V3.indexOf(c)]);

    // ── Voto de cada modelo ──
    const confV1 = Math.max(...probsV1);
    const confV2 = Math.max(...probsV2);
    const confV3 = Math.max(...probsV3);
    const v1Clase = CLASES[probsV1.indexOf(confV1)];
    const v2Clase = CLASES[probsV2.indexOf(confV2)];
    const v3Clase = CLASES[probsV3.indexOf(confV3)];

    const votos = [
        { clase: v1Clase, conf: confV1, modelo: 'V1' },
        { clase: v2Clase, conf: confV2, modelo: 'V2' },
        { clase: v3Clase, conf: confV3, modelo: 'V3' }
    ];

    // ── Votación ponderada por confianza ──
    // Cada modelo "deposita" su confianza como peso en su clase favorita.
    // Si V1=organico(0.72), V2=organico(0.65), V3=reciclable(0.58):
    //   organico   = 0.72 + 0.65 = 1.37
    //   reciclable = 0.58
    //   → organico gana con confianza = 1.37 / (1.37+0.58) = 70.3%
    const pesosPorClase = {};
    CLASES.forEach(c => pesosPorClase[c] = 0);
    votos.forEach(v => pesosPorClase[v.clase] += v.conf);

    const pesoTotal = Object.values(pesosPorClase).reduce((a, b) => a + b, 0);
    const claseGanadora = Object.entries(pesosPorClase)
        .sort((a, b) => b[1] - a[1])[0][0];

    // Confianza normalizada del ganador
    let confianza = pesosPorClase[claseGanadora] / pesoTotal;

    // ── Bonus de unanimidad / mayoría ──
    const coincidencias = votos.filter(v => v.clase === claseGanadora).length;
    if (coincidencias === 3) {
        // Unanimidad → bonus proporcional a confianza promedio
        const confPromedio = (confV1 + confV2 + confV3) / 3;
        confianza = Math.min(0.98, confianza + confPromedio * 0.15);
    } else if (coincidencias === 2) {
        // 2 de 3 → pequeño boost
        confianza = Math.min(0.95, confianza + 0.05);
    }
    // Si ninguno coincide (3 clases distintas) → la confianza ya es baja naturalmente

    return {
        clase:     claseGanadora,
        confianza: confianza,
        todas:     Object.fromEntries(CLASES.map(c => [c, pesosPorClase[c] / pesoTotal])),
        v1_clase:  v1Clase,
        v2_clase:  v2Clase,
        v3_clase:  v3Clase,
        v1_conf:   confV1,
        v2_conf:   confV2,
        v3_conf:   confV3,
        coincidencias: coincidencias,
        // Info para el árbitro local
        modelosDiscrepan: coincidencias < 3,
        confMinima: Math.min(confV1, confV2, confV3)
    };
}

// ============================================================
// GEMINI — proxy serverless /api/gemini
// ============================================================
async function clasificarGemini(base64) {
    if (!base64 || base64.length < 100) return null;
    try {
        const ctrl    = new AbortController();
        const timeout = setTimeout(() => ctrl.abort(), 15000);
        const res     = await fetch('/api/gemini', {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify({ tipo: 'vision', base64Img: base64 }),
            signal:  ctrl.signal
        });
        clearTimeout(timeout);
        if (!res.ok) return null;
        const data  = await res.json();
        const clase = (data.texto || '').trim();
        return CLASES.includes(clase) ? clase : null;
    } catch (err) {
        console.warn('Gemini no disponible:', err.message);
        return null;
    }
}

async function obtenerDato(clase) {
    try {
        const ctrl    = new AbortController();
        const timeout = setTimeout(() => ctrl.abort(), 15000);
        const res     = await fetch('/api/gemini', {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify({ tipo: 'dato', clase }),
            signal:  ctrl.signal
        });
        clearTimeout(timeout);
        const data = await res.json();
        return data.texto || '';
    } catch {
        return '';
    }
}

// ============================================================
// FLUJO PRINCIPAL
// ============================================================
async function clasificar() {
    // Guardia doble: analizando + disabled para evitar doble tap
    if (analizando || !sesionV1 || !sesionV2 || !sesionV3) return;
    analizando = true;
    $btnClasif.disabled = true;
    $btnClasif.textContent = 'ANALIZANDO...';
    $scanOverlay.classList.add('activo');
    $resOverlay.classList.remove('visible');
    limpiarContenedores();

    // Esperar dos frames para que el browser pinte los cambios antes de bloquear el hilo
    await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));

    try {
        const base64 = capturarBase64();

        // Ensemble local — rápido, sin red
        const resEnsemble = await clasificarEnsemble();

        // Mostrar resultado inmediatamente
        $scanOverlay.classList.remove('activo');
        mostrarResultado(resEnsemble.clase, resEnsemble.confianza, 'ensemble', resEnsemble);

        // Rehabilitar botón sin esperar a Gemini
        $btnClasif.disabled = false;
        $btnClasif.textContent = 'CLASIFICAR';
        analizando = false;

        // ── ÁRBITRO LOCAL — decide si llamar a Gemini ──
        const necesitaGemini = resEnsemble.modelosDiscrepan && resEnsemble.confianza < 0.70;

        if (necesitaGemini) {
            // Indicador visual: Gemini está procesando
            $resDato.textContent = '⟳ IA verificando clasificación...';
            $resDato.style.opacity = '0.6';

            // Gemini vision — solo cuando hay duda real
            clasificarGemini(base64).then(claseGemini => {
                $resDato.style.opacity = '1';

                if (!claseGemini) {
                    // Gemini no disponible — indicar que se quedó con ensemble
                    $resDato.textContent = '';
                    // Pedir dato curioso con la clase del ensemble
                    obtenerDato(resEnsemble.clase).then(dato => {
                        if (dato && $resOverlay.classList.contains('visible')) {
                            $resDato.textContent = dato;
                        }
                    }).catch(() => {});
                    return;
                }

                if (!$resOverlay.classList.contains('visible')) return;

                if (claseGemini === resEnsemble.clase) {
                    // Gemini confirma → alta confianza
                    $resBadge.textContent = '✓ ALTA CONFIANZA · ENSEMBLE + IA';
                    $resBadge.className   = 'badge badge-alta';
                } else {
                    // Gemini difiere y el ensemble tenía duda → corregir
                    $resClase.textContent = NOMBRES[claseGemini] || claseGemini.toUpperCase();
                    $resClase.style.color = COLORES[claseGemini] || '#fff';
                    $resBadge.textContent = '⚡ GEMINI CORRIGE ENSEMBLE';
                    $resBadge.className   = 'badge badge-gemini';
                    activarContenedor(claseGemini);
                }

                // Dato curioso con la clase definitiva
                const claseParaDato = claseGemini === resEnsemble.clase ? resEnsemble.clase : claseGemini;
                obtenerDato(claseParaDato).then(dato => {
                    if (dato && $resOverlay.classList.contains('visible')) {
                        $resDato.textContent = dato;
                    }
                }).catch(() => {});

            }).catch(() => {
                $resDato.style.opacity = '1';
                $resDato.textContent = '';
            });
        } else {
            // Ensemble tiene confianza suficiente o todos coinciden → no llamar a Gemini
            // Solo pedir dato curioso
            obtenerDato(resEnsemble.clase).then(dato => {
                if (dato && $resOverlay.classList.contains('visible')) {
                    $resDato.textContent = dato;
                }
            }).catch(() => {});
        }

        return;

    } catch (err) {
        console.error('Error al clasificar:', err);
        $scanOverlay.classList.remove('activo');
    }

    $btnClasif.disabled = false;
    $btnClasif.textContent = 'CLASIFICAR';
    analizando = false;
}

// ============================================================
// MOSTRAR RESULTADO
// ============================================================
function mostrarResultado(clase, confianza, modo, resEnsemble) {
    $resClase.textContent = NOMBRES[clase] || clase.toUpperCase();
    $resClase.style.color = COLORES[clase] || '#fff';
    $resConf.textContent  = (confianza * 100).toFixed(1) + '%';
    $resDato.textContent  = '';
    $resDato.style.opacity = '1';

    const coincidencias = resEnsemble.coincidencias;

    switch (modo) {
        case 'alta-confianza':
            $resBadge.textContent = '✓ ALTA CONFIANZA · ENSEMBLE + IA';
            $resBadge.className   = 'badge badge-alta';
            break;
        case 'gemini-corrige':
            $resBadge.textContent = '⚡ GEMINI CORRIGE ENSEMBLE';
            $resBadge.className   = 'badge badge-gemini';
            break;
        default: // 'ensemble'
            if (coincidencias === 3 && confianza >= 0.70) {
                $resBadge.textContent = '◈ UNANIMIDAD V1+V2+V3';
                $resBadge.className   = 'badge badge-alta';
            } else if (coincidencias === 3) {
                $resBadge.textContent = '◈ V1+V2+V3 COINCIDEN';
                $resBadge.className   = 'badge badge-ensemble';
            } else if (coincidencias === 2) {
                $resBadge.textContent = '◈ MAYORÍA 2/3';
                $resBadge.className   = 'badge badge-ensemble';
            } else {
                $resBadge.textContent = '◈ ENSEMBLE (SIN CONSENSO)';
                $resBadge.className   = 'badge badge-local';
            }
    }

    $resOverlay.classList.add('visible');
    activarContenedor(clase);
}

function activarContenedor(clase) {
    limpiarContenedores();
    const el = document.querySelector(`.contenedor-item[data-clase="${clase}"]`);
    if (el) el.classList.add('activo');
}

function limpiarContenedores() {
    document.querySelectorAll('.contenedor-item').forEach(el => el.classList.remove('activo'));
}

// ============================================================
// EVENTOS
// ============================================================

// Botón principal — touch-action: manipulation en CSS evita el delay de 300ms en móvil
$btnClasif.addEventListener('click', clasificar);

$btnCamara.addEventListener('click', () => {
    usandoCamaraFrontal = !usandoCamaraFrontal;
    iniciarCamara();
});

$btnGaleria.addEventListener('click', () => $inputGal.click());

$inputGal.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
        $previewGal.src = ev.target.result;
        $previewGal.style.display = 'block';
        $previewGal.onload = () => clasificar();
    };
    reader.readAsDataURL(file);
    e.target.value = '';
});

// Tap en la zona de cámara cierra el preview de galería
$video.addEventListener('click', () => {
    if ($previewGal.style.display === 'block') {
        $previewGal.style.display = 'none';
        $resOverlay.classList.remove('visible');
        limpiarContenedores();
    }
});

// ============================================================
// ARRANQUE
// ============================================================
inicializar();

if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        // Forzar que el SW se actualice en cada visita (no cachear sw.js)
        navigator.serviceWorker.register('sw.js', { updateViaCache: 'none' }).catch(() => {});
    });
}
